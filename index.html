<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Corpsfamilie der Vogels — XXIe Lustrum — Stille Veiling</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rood: #8B1A1A;
      --rood-dark: #6e1414;
      --goud: #C9A84C;
      --goud-light: #F0D080;
      --bg: #f5f0e8;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #666;
      --border: rgba(0,0,0,0.1);
      --radius: 12px;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    .header { background: var(--rood); padding: 1.5rem 1.25rem 1.25rem; text-align: center; }
    .header-logo { height: 90px; object-fit: contain; margin-bottom: 0.75rem;  }
    .header h1 { font-size: clamp(14px, 3.5vw, 22px); font-weight: 600; color: var(--goud-light); letter-spacing: 2px; text-transform: uppercase; line-height: 1.4; }
    .header .subtitle { font-size: 12px; color: var(--goud); margin-top: 5px; letter-spacing: 1px; }
    .ornament { color: var(--goud); font-size: 16px; margin: 5px 0; }

    .countdown-bar { background: var(--rood-dark); padding: 0.6rem 1.25rem; display: flex; align-items: center; justify-content: center; gap: 0.75rem; flex-wrap: wrap; }
    .countdown-bar span:first-child { font-size: 11px; color: var(--goud); letter-spacing: 1px; text-transform: uppercase; }
    .countdown-bar span:last-child { font-size: 15px; font-weight: 600; color: var(--goud-light); font-variant-numeric: tabular-nums; }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1rem; }
    .section-title { text-align: center; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--rood); margin-bottom: 1.5rem; display: flex; align-items: center; gap: 1rem; }
    .section-title::before, .section-title::after { content: ""; flex: 1; height: 1px; background: var(--goud); opacity: 0.5; }

    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 1.25rem; }

    .card { background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; display: flex; flex-direction: column; transition: transform 0.15s, box-shadow 0.15s; }
    .card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(139,26,26,0.12); }
    .card-img { width: 100%; height: 200px; object-fit: cover; display: block; }
    .card-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; gap: 6px; }
    .card-title { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.6; }

    .lees-meer-btn { background: none; border: none; color: var(--rood); font-size: 12px; cursor: pointer; padding: 0; font-family: inherit; text-decoration: underline; text-align: left; margin-top: 2px; }
    .lees-meer-content { font-size: 12px; color: var(--text-muted); line-height: 1.6; margin-top: 6px; display: none; }
    .lees-meer-content.open { display: block; }

    .card-footer { padding: 0.875rem 1rem; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: #faf7f2; }
    .bid-col { display: flex; flex-direction: column; gap: 2px; }
    .bid-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .bid-amount { font-size: 20px; font-weight: 700; color: var(--rood); }
    .bid-meta { font-size: 10px; color: var(--text-muted); }
    .bid-btn { background: var(--rood); color: var(--goud-light); border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .bid-btn:hover { background: var(--rood-dark); }

    .loading-grid { display: flex; align-items: center; justify-content: center; padding: 3rem; color: var(--text-muted); font-size: 14px; }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; padding: 1rem; }
    .overlay.open { display: flex; }
    .modal { background: #fff; border-radius: var(--radius); width: 100%; max-width: 440px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .modal-header { background: var(--rood); padding: 1.25rem 1.5rem; }
    .modal-header h2 { font-size: 16px; font-weight: 600; color: var(--goud-light); }
    .modal-header p { font-size: 12px; color: var(--goud); margin-top: 3px; }
    .modal-body { padding: 1.5rem; }

    .steps { display: flex; gap: 6px; margin-bottom: 1.25rem; }
    .step { height: 4px; flex: 1; border-radius: 2px; background: #e0d6c8; }
    .step.active { background: var(--rood); }
    .step.done { background: var(--goud); }

    .field { margin-bottom: 1rem; }
    .field label { font-size: 12px; color: var(--text-muted); display: block; margin-bottom: 5px; font-weight: 500; }
    .field input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; font-family: inherit; color: var(--text); background: #fff; transition: border-color 0.15s; }
    .field input:focus { outline: none; border-color: var(--rood); }
    .name-row { display: flex; gap: 8px; }
    .name-row input { flex: 1; }
    .gen-btn { background: #f5f0e8; border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; font-size: 11px; cursor: pointer; font-family: inherit; color: var(--text-muted); white-space: nowrap; transition: background 0.15s; }
    .gen-btn:hover { background: #ede6d6; }

    .error { font-size: 12px; color: #c0392b; margin-top: 6px; display: none; padding: 8px 10px; background: #fdf0f0; border-radius: 6px; }
    .modal-actions { display: flex; gap: 8px; margin-top: 1.25rem; }
    .modal-actions button { flex: 1; padding: 11px; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: inherit; font-weight: 500; transition: all 0.15s; }
    .btn-sec { background: #fff; border: 1px solid #ddd; color: var(--text-muted); }
    .btn-sec:hover { background: #f5f0e8; }
    .btn-pri { background: var(--rood); color: var(--goud-light); border: none; }
    .btn-pri:hover { background: var(--rood-dark); }
    .btn-pri:disabled { background: #ccc; color: #999; cursor: not-allowed; }

    .success-body { padding: 2rem 1.5rem; text-align: center; }
    .success-icon { width: 56px; height: 56px; border-radius: 50%; background: #eaf5e9; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; font-size: 24px; color: #27ae60; }
    .success-body h3 { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 8px; }
    .success-body p { font-size: 13px; color: var(--text-muted); line-height: 1.6; }
    .biedcode-badge { display: inline-block; background: var(--rood); color: var(--goud-light); padding: 6px 18px; border-radius: 8px; font-size: 15px; font-weight: 600; margin: 0.75rem 0; letter-spacing: 1px; }

    footer { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 12px; border-top: 1px solid var(--border); margin-top: 2rem; }
    footer span { color: var(--rood); font-weight: 600; }

    @media (max-width: 480px) {
      .grid { grid-template-columns: 1fr; }
      .modal { max-width: 100%; border-radius: var(--radius) var(--radius) 0 0; }
      .overlay { align-items: flex-end; padding: 0; }
    }
  </style>
</head>

    meer:"Met deze 300 volledig te personaliseren bidons maak je gegarandeerd indruk! Voorzie de bidons van je eigen logo, naam of design en creëer een herkenbare en professionele uitstraling. Ideaal voor sportteams, bedrijfsuitjes, evenementen of als originele giveaway." },
  { num:"10", titel:"Dagje Duinrell & lunch (10p)", img:"duinrell",
    desc:"Dit arrangement is inclusief toegang tot zowel het attractiepark als het Tikibad, én een heerlijke lunch.",
    meer:"Of u nu komt voor spanning, ontspanning of gezellig samenzijn: dit uitje biedt voor ieder wat wils. Waar: Duinrell. Wanneer: in overleg. Aantal personen: 10." },
  { num:"16", titel:"6 uur varen Bergse Plas (6p)", img:"varen",
    desc:"Geniet met zes personen van een zes uur durende boottocht over de prachtige Bergse Plassen.",
    meer:"Pieter en Luuk verzorgen een compleet verzorgde dag op het water waarbij het u aan niets ontbreekt. U wordt in de watten gelegd met een luxe borrelplank vol kaas, vleeswaren en verse oesters. Het bijbehorende drankarrangement met fris, bier en wijn maakt de middag helemaal compleet." },
  { num:"H", titel:"Huisje in Dalfsen", img:"dalfsen",
    desc:"Geniet een weekend van rust, ruimte en natuur met een heerlijk verblijf in een sfeervol huisje in Dalfsen.",
    meer:"Omringd door groen en gelegen in een prachtige omgeving is dit de ideale plek om even helemaal tot ontspanning te komen. Maak mooie wandelingen of fietstochten langs de Vecht, ontdek de charme van het dorp en geniet van quality time samen." },
  { num:"UL", titel:"Rondleiding atelier Urbann Larsson", img:"atelier",
    desc:"Een unieke rondleiding door het atelier van de gerenommeerde kunstschilder Urbann Larsson.",
    meer:"Ga mee achter de schermen van een werkend kunstenaarstelier en ontdek hoe Urbann Larsson zijn meesterwerken tot stand brengt. Een bijzondere en inspirerende ervaring voor iedereen met een liefde voor kunst en vakmanschap." },
];

let hoogsteBiedingen = {};
let hoogsteBieders = {};
let profiel = null;
let actief = null;

kavels.forEach(k => { hoogsteBiedingen[k.num] = 0; hoogsteBieders[k.num] = null; });

async function laadBiedingen() {
  const { data, error } = await db.from("biedingen").select("kavel_num, bedrag, biedcode").order("bedrag", { ascending: false });
  if (error) { console.error(error); return; }
  kavels.forEach(k => {
    const beste = data.find(b => b.kavel_num === k.num);
    if (beste) { hoogsteBiedingen[k.num] = beste.bedrag; hoogsteBieders[k.num] = beste.biedcode; }
  });
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  kavels.forEach(k => {
    const hoogste = hoogsteBiedingen[k.num];
    const bieder = hoogsteBieders[k.num];
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img class="card-img" src="${IMGS[k.img]}" alt="${k.titel}" />
      <div class="card-body">
        <div class="card-title">${k.titel}</div>
        <div class="card-desc">${k.desc}</div>
        <button class="lees-meer-btn" onclick="toggleMeer(this)">Lees meer</button>
        <div class="lees-meer-content">${k.meer}</div>
      </div>
      <div class="card-footer">
        <div class="bid-col">
          <span class="bid-label">Hoogste bod</span>
          <span class="bid-amount">€${hoogste}</span>
          <span class="bid-meta">${bieder ? "door " + bieder : "Wees de eerste!"}</span>
        </div>
        <button class="bid-btn" onclick="openModal('${k.num}')">Bied</button>
      </div>`;
    grid.appendChild(card);
  });
}

function toggleMeer(btn) {
  const content = btn.nextElementSibling;
  content.classList.toggle("open");
  btn.textContent = content.classList.contains("open") ? "Lees minder" : "Lees meer";
}

function genVogel() {
  return VOGELS[Math.floor(Math.random() * VOGELS.length)] + Math.floor(10 + Math.random() * 90);
}

function isGepast(code) {
  return !VERBODEN.some(w => code.toLowerCase().includes(w));
}

function openModal(num) {
  actief = kavels.find(k => k.num === num);
  document.getElementById("m-titel").textContent = actief.titel;
  document.getElementById("m-sub").textContent = `Huidig hoogste bod: €${hoogsteBiedingen[actief.num]}`;
  profiel ? showStap2() : showStap1();
  document.getElementById("overlay").classList.add("open");
}

function closeModal() { document.getElementById("overlay").classList.remove("open"); }

function showStap1() {
  const gen = genVogel();
  document.getElementById("m-content").innerHTML = `
    <div class="modal-body">
      <div class="steps"><div class="step active"></div><div class="step"></div></div>
      <p style="font-size:13px;color:#666;margin-bottom:1.25rem;line-height:1.6;">Registreer je eenmalig. Jouw biedcode is anoniem zichtbaar — alleen de organisatie weet wie je bent.</p>
      <div class="field">
        <label>Jouw naam (blijft privé)</label>
        <input type="text" id="s1-naam" placeholder="Voor- en achternaam" />
      </div>
      <div class="field">
        <label>Biedcode (zichtbaar voor andere bieders)</label>
        <div class="name-row">
          <input type="text" id="s1-code" value="${gen}" maxlength="20" />
          <button class="gen-btn" onclick="document.getElementById('s1-code').value=genVogel()">Nieuwe</button>
        </div>
        <div style="font-size:11px;color:#999;margin-top:4px;">Of kies zelf een naam</div>
      </div>
      <div class="field">
        <label>E-mailadres (voor contact na de veiling)</label>
        <input type="email" id="s1-contact" placeholder="jouw@email.nl" />
      </div>
      <div class="error" id="s1-err">Vul alle velden correct in.</div>
      <div class="modal-actions">
        <button class="btn-sec" onclick="closeModal()">Annuleren</button>
        <button class="btn-pri" id="s1-btn" onclick="stap1Door()">Verder →</button>
      </div>
    </div>`;
}

async function stap1Door() {
  const naam = document.getElementById("s1-naam").value.trim();
  const code = document.getElementById("s1-code").value.trim();
  const contact = document.getElementById("s1-contact").value.trim();
  const err = document.getElementById("s1-err");
  const btn = document.getElementById("s1-btn");
  if (!naam || !code || !contact || !isGepast(code)) {
    err.textContent = !isGepast(code) ? "Deze biedcode wordt niet goedgekeurd, kies een andere." : "Vul alle velden correct in.";
    err.style.display = "block"; return;
  }
  btn.disabled = true; btn.textContent = "Even wachten...";
  const { error } = await db.from("bieders").insert([{ naam, biedcode: code, contact, contact_type: "email" }]);
  if (error) {
    err.textContent = error.code === "23505" ? "Deze biedcode is al in gebruik, kies een andere." : "Er ging iets mis. Probeer opnieuw.";
    err.style.display = "block"; btn.disabled = false; btn.textContent = "Verder →"; return;
  }
  profiel = { naam, code, contact };
  showStap2();
}

function showStap2() {
  const huidig = hoogsteBiedingen[actief.num];
  document.getElementById("m-sub").textContent = `Huidig hoogste bod: €${huidig}`;
  document.getElementById("m-content").innerHTML = `
    <div class="modal-body">
      <div class="steps"><div class="step done"></div><div class="step active"></div></div>
      <p style="font-size:13px;color:#666;margin-bottom:1.25rem;line-height:1.6;">Je biedt als <strong style="color:#8B1A1A;">${profiel.code}</strong>. Huidig hoogste bod: <strong>€${huidig}</strong></p>
      <div class="field">
        <label>Jouw bod in euro's</label>
        <input type="number" id="s2-bod" placeholder="Minimaal €${huidig + 1}" min="${huidig + 1}" step="1" />
      </div>
      <div class="error" id="s2-err"></div>
      <div class="modal-actions">
        <button class="btn-sec" onclick="closeModal()">Annuleren</button>
        <button class="btn-pri" id="s2-btn" onclick="submitBod()">Bod bevestigen</button>
      </div>
    </div>`;
}

async function submitBod() {
  const bod = parseFloat(document.getElementById("s2-bod").value);
  const err = document.getElementById("s2-err");
  const btn = document.getElementById("s2-btn");
  if (isNaN(bod) || bod <= hoogsteBiedingen[actief.num] || bod < 0) {
    err.textContent = `Jouw bod moet hoger zijn dan €${hoogsteBiedingen[actief.num]}.`;
    err.style.display = "block"; return;
  }
  btn.disabled = true; btn.textContent = "Bezig...";
  const { data } = await db.from("biedingen").select("bedrag").eq("kavel_num", actief.num).order("bedrag", { ascending: false }).limit(1);
  const huidig = data && data.length > 0 ? data[0].bedrag : 0;
  if (bod <= huidig) {
    err.textContent = `Iemand was je voor! Het hoogste bod is nu €${huidig}.`;
    err.style.display = "block"; hoogsteBiedingen[actief.num] = huidig; renderGrid();
    btn.disabled = false; btn.textContent = "Bod bevestigen"; return;
  }
  const { error } = await db.from("biedingen").insert([{ kavel_num: actief.num, bedrag: bod, biedcode: profiel.code }]);
  if (error) {
    err.textContent = "Er ging iets mis. Probeer opnieuw.";
    err.style.display = "block"; btn.disabled = false; btn.textContent = "Bod bevestigen"; return;
  }
  hoogsteBiedingen[actief.num] = bod; hoogsteBieders[actief.num] = profiel.code; renderGrid();
  document.getElementById("m-content").innerHTML = `
    <div class="success-body">
      <div class="success-icon">✓</div>
      <h3>Bod geplaatst!</h3>
      <div class="biedcode-badge">${profiel.code}</div>
      <p>Je bod van <strong>€${bod}</strong> op <strong>${actief.titel}</strong> is opgeslagen.<br><br>Als je wint nemen we contact op via je e-mailadres.</p>
      <div class="modal-actions" style="margin-top:1.25rem;">
        <button class="btn-pri" style="flex:1;" onclick="closeModal()">Sluiten</button>
      </div>
    </div>`;
}

document.getElementById("overlay").addEventListener("click", function(e) { if (e.target === this) closeModal(); });

function updateCountdown() {
  const eind = new Date("2026-05-03T00:00:00");
  const nu = new Date();
  const diff = eind - nu;
  if (diff <= 0) { document.getElementById("countdown").textContent = "Veiling gesloten"; return; }
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  document.getElementById("countdown").textContent = `${d}d ${h}u ${m}m ${s}s`;
}

laadBiedingen();
updateCountdown();
setInterval(updateCountdown, 1000);
setInterval(laadBiedingen, 30000);
</script>
</body>
</html>
